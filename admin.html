<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTECH PLUS | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-[#0f172a] text-white min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <h1 class="text-3xl font-black text-blue-500">BTECH PLUS ADMIN</h1>
            <button onclick="loadOrders()" class="bg-blue-600 px-4 py-2 rounded-lg hover:bg-blue-700">
                <i class="fas fa-sync"></i> Refresh Data
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <p class="text-gray-400 text-sm">Total Sales</p>
                <h2 id="totalSales" class="text-2xl font-bold">KES 0</h2>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <p class="text-gray-400 text-sm">Paid Orders</p>
                <h2 id="paidCount" class="text-2xl font-bold text-green-500">0</h2>
            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <p class="text-gray-400 text-sm">Pending Payments</p>
                <h2 id="pendingCount" class="text-2xl font-bold text-yellow-500">0</h2>
            </div>
        </div>

        <div class="bg-slate-800 rounded-2xl border border-slate-700 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-900 text-gray-400 uppercase text-xs">
                    <tr>
                        <th class="p-4">Order ID</th>
                        <th class="p-4">Customer</th>
                        <th class="p-4">Type</th>
                        <th class="p-4">Amount</th>
                        <th class="p-4">Status</th>
                        <th class="p-4">M-Pesa Ref</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://btechplus-backend-mpesa.onrender.com/api/admin/orders';

        async function loadOrders() {
            const response = await fetch(API_URL);
            const orders = await response.json();
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = '';

            let sales = 0;
            let paid = 0;
            let pending = 0;

            orders.forEach(order => {
                if(order.payment_status === 'PAID') {
                    sales += order.amount;
                    paid++;
                } else {
                    pending++;
                }

                tbody.innerHTML += `
                    <tr class="border-b border-slate-700 hover:bg-slate-700/50">
                        <td class="p-4 font-mono text-sm">${order.order_id}</td>
                        <td class="p-4">
                            <div class="font-bold">${order.customer_name}</div>
                            <div class="text-xs text-gray-400">${order.phone_number}</div>
                        </td>
                        <td class="p-4 text-sm">${order.shirt_type}</td>
                        <td class="p-4 font-bold">KES ${order.amount}</td>
                        <td class="p-4">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${order.payment_status === 'PAID' ? 'bg-green-500/20 text-green-500' : 'bg-yellow-500/20 text-yellow-500'}">
                                ${order.payment_status}
                            </span>
                        </td>
                        <td class="p-4 text-sm text-blue-400 font-mono">${order.mpesa_receipt || '---'}</td>
                    </tr>
                `;
            });

            document.getElementById('totalSales').innerText = `KES ${sales.toLocaleString()}`;
            document.getElementById('paidCount').innerText = paid;
            document.getElementById('pendingCount').innerText = pending;
        }

        window.onload = loadOrders;
    </script>
</body>
</html>
